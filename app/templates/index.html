<!DOCTYPE html>
<html>
<head>
    <title>RAG 问答系统</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        #query { width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box; }
        #submit { padding: 10px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .options { margin-top: 10px; color: #555; font-size: 14px; }
        .options label { cursor: pointer; }
        #answer { margin-top: 20px; padding: 18px; background: #f8f9fa; border-radius: 6px; line-height: 1.8; font-size: 15px; color: #333; }
        #answer p { margin: 0 0 12px 0; }
        #answer p:last-child { margin-bottom: 0; }
        #answer strong { color: #1a1a1a; }
        #answer h3 { font-size: 17px; margin: 16px 0 8px 0; color: #222; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
        #sources { margin-top: 24px; }
        .source-item { background: #fafafa; border: 1px solid #e0e0e0; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
        .source-header { font-weight: bold; color: #333; margin-bottom: 6px; }
        .source-text { color: #555; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>
    <h1>Python 文档 RAG 问答系统</h1>
    <input type="text" id="query" placeholder="输入你的问题...">
    <div class="options">
        <label><input type="checkbox" id="useRewrite" checked> 启用 Query 改写（多查询扩展）</label>
    </div>
    <button id="submit" onclick="ask()">提问</button>
    <div id="answer"></div>
    <div id="sources"></div>

    <script>
        function ask() {
            const query = document.getElementById('query').value;
            const useRewrite = document.getElementById('useRewrite').checked;
            const answerDiv = document.getElementById('answer');
            const sourcesDiv = document.getElementById('sources');
            answerDiv.textContent = '';
            sourcesDiv.innerHTML = '';
            let rawAnswer = '';

            const eventSource = new EventSource('/api/stream?q=' + encodeURIComponent(query) + '&rewrite=' + (useRewrite ? '1' : '0'));
            eventSource.onmessage = function(event) {
                if (event.data === '[DONE]') {
                    answerDiv.innerHTML = simpleMarkdownToHtml(rawAnswer);
                    eventSource.close();
                } else if (event.data.startsWith('[SOURCES]')) {
                    const jsonStr = event.data.replace('[SOURCES]', '');
                    const sources = JSON.parse(jsonStr);
                    if (sources.length > 0) {
                        let html = '<h3>引用来源</h3>';
                        for (const s of sources) {
                            html += '<div class="source-item">';
                            html += '<div class="source-header">[' + s.index + '] ' + escapeHtml(s.source) + '</div>';
                            html += '<div class="source-text">' + escapeHtml(s.text) + '</div>';
                            html += '</div>';
                        }
                        sourcesDiv.innerHTML = html;
                    }
                } else {
                    rawAnswer += event.data;
                    answerDiv.textContent = rawAnswer;
                }
            };
            eventSource.onerror = function() {
                eventSource.close();
            };
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function simpleMarkdownToHtml(text) {
            let html = escapeHtml(text);
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^# (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            const paragraphs = html.split(/\n\n+/);
            const wrapped = paragraphs.map(p => {
                p = p.trim();
                if (!p) return '';
                if (p.startsWith('<h3>')) return p;
                p = p.replace(/\n/g, '<br>');
                return '<p>' + p + '</p>';
            }).filter(Boolean);
            return wrapped.join('\n');
        }
    </script>
</body>
</html>
